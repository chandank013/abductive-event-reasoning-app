# Baseline Experiment Configuration

experiment:
  name: "baseline"
  description: "Baseline experiments for AER task"
  
models:
  - name: "mock"
    provider: "mock"
    temperature: 0.3
    max_tokens: 100
    
  - name: "gpt-3.5-turbo"
    provider: "openai"
    temperature: 0.3
    max_tokens: 100
    
  - name: "gpt-4"
    provider: "openai"
    temperature: 0.3
    max_tokens: 100

strategies:
  - "zero_shot"
  - "cot"
  - "few_shot"

data:
  train_dir: "data/train"
  dev_dir: "data/dev"
  test_dir: "data/test"

output:
  results_dir: "outputs/results"